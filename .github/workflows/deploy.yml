name: build-scan-deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/k8s-demo-app:${{ github.sha }}
          push: false

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/k8s-demo-app:${{ github.sha }}
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
